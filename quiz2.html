/* ===================================================== */
/* KOLORY */
/* ===================================================== */

const typeColors = {

wyspa:"orange",
morze:"blue",
rzeka:"cyan",
jezioro:"purple",
zatoka:"yellow",
cieśnina:"pink"

};

/* ===================================================== */
/* MAPA */
/* ===================================================== */

const map = L.map('map').setView([20,0],2);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19
}
).addTo(map);

/* ===================================================== */
/* ELEMENTY HTML */
/* ===================================================== */

const questionDisplay =
document.getElementById("question");

const scoreDisplay =
document.getElementById("score");

const attemptsDisplay =
document.getElementById("attempts");

const messageDisplay =
document.getElementById("message");

const restartBtn =
document.getElementById("restartBtn");

/* ===================================================== */
/* ZMIENNE */
/* ===================================================== */

let currentIndex = 0;
let score = 0;
let attempts = 3;

/* ===================================================== */
/* TWORZENIE PUNKTÓW */
/* ===================================================== */

objects.forEach(obj => {

obj.solved = false;

const color =
typeColors[obj.type] || "gray";

obj.marker = L.circleMarker(
[obj.coords[1],obj.coords[0]],
{
radius:8,
color:color,
fillColor:color,
fillOpacity:0.8
}
).addTo(map);

obj.marker.on("click", () => {

if(obj.solved) return;

const currentObject =
objects[currentIndex];

/* ===== DOBRA ODPOWIEDŹ ===== */

if(obj === currentObject){

let earnedPoints = 0;

if(attempts === 3){
earnedPoints = 1;
}
else if(attempts === 2){
earnedPoints = 0.5;
}
else if(attempts === 1){
earnedPoints = 0.25;
}

score += earnedPoints;

scoreDisplay.textContent =
`Punkty: ${score.toFixed(2)}`;

messageDisplay.innerHTML =
`✅ Dobrze! +${earnedPoints} pkt`;

obj.solved = true;

obj.marker.setStyle({
color:"green",
fillColor:"green"
});

setTimeout(() => {

messageDisplay.innerHTML = "";

nextQuestion();

},1000);

}

/* ===== ZŁA ODPOWIEDŹ ===== */

else{

attempts--;

attemptsDisplay.textContent =
`Pozostałe próby: ${attempts}`;

messageDisplay.innerHTML =
`❌ Źle!`;

if(attempts <= 0){

messageDisplay.innerHTML =
`❌ Brak prób!`;

currentObject.marker.setStyle({
color:"red",
fillColor:"red"
});

setTimeout(() => {

messageDisplay.innerHTML = "";

nextQuestion();

},1200);

}

}

});

});

/* ===================================================== */
/* NASTĘPNE PYTANIE */
/* ===================================================== */

function nextQuestion(){

attempts = 3;

attemptsDisplay.textContent =
"Pozostałe próby: 3";

currentIndex++;

if(currentIndex >= objects.length){

const percent =
((score / objects.length) * 100).toFixed(1);

questionDisplay.innerHTML =
`
Quiz zakończony!<br><br>

Wynik: ${score.toFixed(2)} / ${objects.length}<br>

Procent poprawnych odpowiedzi:
${percent}%
`;

attemptsDisplay.innerHTML = "";
messageDisplay.innerHTML = "";

restartBtn.style.display =
"inline-block";

return;

}

questionDisplay.textContent =
`Znajdź na mapie: ${objects[currentIndex].name}`;

}

/* ===================================================== */
/* RESET */
/* ===================================================== */

restartBtn.addEventListener("click", () => {

score = 0;
currentIndex = 0;
attempts = 3;

scoreDisplay.textContent =
"Punkty: 0";

attemptsDisplay.textContent =
"Pozostałe próby: 3";

messageDisplay.innerHTML = "";

restartBtn.style.display =
"none";

objects.forEach(obj => {

obj.solved = false;

const color =
typeColors[obj.type] || "gray";

obj.marker.setStyle({
color:color,
fillColor:color
});

});

questionDisplay.textContent =
`Znajdź na mapie: ${objects[0].name}`;

});

/* ===================================================== */
/* START */
/* ===================================================== */

questionDisplay.textContent =
`Znajdź na mapie: ${objects[0].name}`;
